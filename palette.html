<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>AFKode Prompt</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body { background: transparent; overflow: hidden; height: 100%; }
      body {
        font-family: "Segoe UI Variable Text", "Segoe UI", system-ui, sans-serif;
        display: flex; align-items: center; justify-content: center; padding: 8px;
      }
      .box {
        display: flex; flex-direction: column; justify-content: center;
        width: 100%; padding: 9px 18px;
        background: rgba(20, 22, 29, 0.96);
        border: 1px solid rgba(217, 119, 87, 0.45);
        border-radius: 14px;
        box-shadow: 0 10px 34px rgba(0, 0, 0, 0.55);
      }
      .row { display: flex; align-items: center; gap: 12px; height: 38px; }
      .ctx {
        display: none; font-size: 11px; color: #8b93a1;
        overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
        padding-left: 28px;
      }
      .ctx.visible { display: block; }
      .ctx b { color: #c9d1d9; font-weight: 600; }
      .sugs { display: none; margin-top: 4px; }
      .sugs.visible { display: block; }
      .sug {
        display: flex; align-items: center; gap: 9px;
        height: 28px; padding: 0 10px; margin: 1px 0;
        border-radius: 7px; font-size: 12.5px; color: #c9d1d9;
        cursor: pointer;
        overflow: hidden; white-space: nowrap;
      }
      .sug.sel, .sug:hover { background: rgba(217, 119, 87, 0.16); color: #e6eaf0; }
      .sug-ico { font-size: 11px; opacity: 0.7; flex-shrink: 0; }
      .sug-text { overflow: hidden; text-overflow: ellipsis; }
      .spark { color: #d97757; font-size: 16px; }
      input {
        flex: 1; border: 0; outline: none; background: transparent;
        color: #e6eaf0; font-size: 15px; font-family: inherit;
      }
      input::placeholder { color: #6f7684; }
      kbd {
        padding: 2px 6px; border: 1px solid rgba(255,255,255,0.14);
        border-bottom-width: 2px; border-radius: 4px;
        background: rgba(255,255,255,0.05); color: #8b93a1;
        font-family: inherit; font-size: 10px;
      }
    </style>
    <script type="module" src="/src/palette.ts" defer></script>
  </head>
  <body>
    <div class="box">
      <div class="row">
        <span class="spark">❯</span>
        <input id="prompt" autocomplete="off" spellcheck="false" />
        <kbd>Enter</kbd>
      </div>
      <div class="ctx" id="ctx"><b id="ctx-title"></b><span id="ctx-detail"></span></div>
      <div class="sugs" id="sugs"></div>
    </div>
  </body>
</html>
